name: Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: platform-event-bus-core

jobs:
  build-and-smoke:
    name: Build image and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${IMAGE_NAME}:${{ steps.meta.outputs.tag }}" \
            -t "${IMAGE_NAME}:staging" \
            .

      - name: Run container
        run: |
          docker run -d --name middleware-staging \
            -e APP_ENV=local \
            -e APP_DEBUG=true \
            -e APP_KEY=base64:bGVnYWN5LWtleS1mb3Itc3RhZ2luZy1zbW9rZS10ZXN0LW9ubHk= \
            -e PLATFORM_API_AUTH_ENABLED=true \
            -e PLATFORM_API_KEYS=ci-smoke-key|events:publish,bus:read,bus:admin,dashboard:read \
            -p 8080:8080 \
            "${IMAGE_NAME}:staging"

      - name: Wait for HTTP
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/up >/dev/null 2>&1; then
              echo "Liveness OK"
              if curl -fsS http://127.0.0.1:8080/health/ready | grep -q '"ready"'; then
                echo "Readiness OK"
                exit 0
              fi
            fi
            sleep 2
          done
          echo "Timeout waiting for health"
          docker logs middleware-staging
          exit 1

      - name: Smoke test
        env:
          APP_URL: http://127.0.0.1:8080
          PLATFORM_API_KEY: ci-smoke-key
        run: bash scripts/ci/smoke-test.sh

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        continue-on-error: true
        with:
          target: http://127.0.0.1:8080
          cmd_options: '-a'

      - name: Container logs on failure
        if: failure()
        run: docker logs middleware-staging || true

      - name: Stop container
        if: always()
        run: docker rm -f middleware-staging || true

  deploy-staging:
    name: Deploy staging (placeholder)
    runs-on: ubuntu-latest
    needs: [build-and-smoke]
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Staging deploy note
        run: |
          echo "Image validated locally in CI."
          echo "Wire cloud registry push + kubectl/compose deploy using secrets:"
          echo "  STAGING_REGISTRY, STAGING_HOST, DEPLOY_KEY"

  deploy-production:
    name: Deploy production (manual approval)
    runs-on: ubuntu-latest
    needs: [build-and-smoke]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Production deploy gate
        run: |
          echo "Manual approval required. Configure production secrets and deploy target."
          echo "Suggested flow: tag release -> promote staging image -> deploy prod."
