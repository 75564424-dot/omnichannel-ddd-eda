name: Nightly Client Simulation

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-client-simulation
  cancel-in-progress: true

jobs:
  multi-client-simulation:
    name: Simulate all client fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run multi-client E2E simulation tests
        run: |
          vendor/bin/phpunit -c phpunit.xml \
            --filter MultiClientFixtureSimulationTest

      - name: Run simulate-client feature tests
        run: |
          vendor/bin/phpunit -c phpunit.xml \
            tests/Feature/Platform/SimulateClientCommandTest.php
